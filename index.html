<!DOCTYPE html>
<html>
<head>
    <title>CodeSnap</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <h2>CS 🚀</h2> 
        
        <p><button title="Friends"><i class='bx bx-user-plus'></i></button></p>
        <p><button title="DMs"><i class='bx bx-message-rounded-detail'></i></button></p>
        <p><button title="Forums"><i class='bx bx-git-repo-forked'></i></button></p>
        <p><button title="Reels"><i class='bx bx-video'></i></button></p>
        <p><button title="Profile"><i class='bx bx-user-circle'></i></button></p>
    </div>

    <div class="main-content">
        <div class="top-ribbon">
            <h1>Good Morning, Vincent!</h1>
            <button>+ New Post</button>
            <button>🎥 New Reel</button>
            <input type="text" placeholder="Search tags...">
        </div>

        <div class="feed-posts">
            <p>Post feed loading...</p>
        </div>
    </div>

</body>
</html>
