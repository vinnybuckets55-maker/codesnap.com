<!DOCTYPE html>
<html>
<head>
    <title>CodeSnap - Create Post</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <script src="create.js" defer></script>
</head>
<body>

    <div class="sidebar">
        <a href="index.html" style="text-decoration: none;"><h2>CS 🚀</h2></a> 
        <p><a href="index.html"><button title="Home"><i class='bx bx-home-alt'></i></button></a></p>
        <p><button title="DMs"><i class='bx bx-message-rounded-detail'></i></button></p>
        <p><button title="Forums"><i class='bx bx-git-repo-forked'></i></button></p>
        <p><a href="reels.html"><button title="Reels"><i class='bx bx-video'></i></button></a></p>
        <p><button title="Profile"><i class='bx bx-user-circle'></i></button></p>
    </div>

    <div class="main-content">
        <div class="top-ribbon">
            <h1>Create a CodeSnap 📝</h1>
            <a href="index.html" style="text-decoration: none;">
                <button class="btn-primary" style="width: auto; height: 40px; border-radius: 20px; padding: 0 15px; font-size: 14px;">
                    Cancel
                </button>
            </a>
        </div>

        <div class="feed-posts">
            <div class="post-card" style="display: flex; flex-direction: column; gap: 15px;">
                <h3 style="margin: 0; color: #0077ff;">What's the bug?</h3>
                
                <input type="text" id="postTitle" placeholder="Title (e.g., C++ Vector Out of Bounds Error)" style="background-color: #1a1a1e; border: 1px solid #2a2a30; color: #ffffff; padding: 12px; border-radius: 8px; outline: none; font-size: 15px;">
                <textarea id="postBody" placeholder="Describe what's breaking in your application..." style="background-color: #1a1a1e; border: 1px solid #2a2a30; color: #ffffff; padding: 12px; border-radius: 8px; outline: none; font-size: 15px; height: 100px; resize: none; font-family: sans-serif;"></textarea>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                    <h4 style="margin: 0; color: #8e8e93;">Code Snippet (Optional)</h4>
                    
                    <input type="file" id="codeFilePicker" accept=".cpp,.h,.java,.js,.py,.html,.css,.txt" style="display: none;">
                    <button type="button" id="uploadFileBtn" style="background-color: #1a1a1e; border: 1px solid #2a2a30; color: #ffffff; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;">
                        <i class='bx bx-folder-open' style="color: #0077ff; font-size: 16px;"></i> Import Code File
                    </button>
                </div>
                <textarea id="postCodeSnippet" placeholder="// Your raw code lines will show up here, or you can paste them manually..." style="background-color: #111114; border: 1px solid #2a2a30; color: #a9b7c6; padding: 12px; border-radius: 8px; outline: none; font-size: 14px; height: 150px; resize: none; font-family: monospace;"></textarea>

                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="tagInput" placeholder="Type a tag then click +" style="background-color: #1a1a1e; border: 1px solid #2a2a30; color: #ffffff; padding: 10px; border-radius: 8px; outline: none; font-size: 14px; flex: 1;">
                    <button id="addTagBtn" type="button" style="background-color: #1a1a1e; border: 1px solid #2a2a30; color: #0077ff; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer;"><i class='bx bx-plus'></i></button>
                </div>
                <div id="tagsList" class="tags-container" style="min-height: 25px;"></div>

                <button class="submit-post-btn" style="background-color: #0077ff; color: #ffffff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px;">
                    Snap It Live 🚀
                </button>
            </div>
        </div>
    </div>

</body>
</html>
